name: npm publish (@helly25/coderef wrapper)

# Publishes the npm wrapper (@helly25/coderef) to https://registry.npmjs.org.
# The wrapper itself doesn't ship a binary — its postinstall script
# downloads the matching tarball from the corresponding GitHub
# Release. So this channel depends on Channel 1 (release.yml)
# completing first, otherwise `npm install -g @helly25/coderef@<X>`
# 404s during postinstall.
#
# Triggers:
#   - `push: tags: v*.*.*` — fires on the same tag push that drives
#     release.yml and vscode_marketplace.yml. The "wait for GitHub
#     Release" step below polls until release.yml has finished
#     creating the release with assets, then publishes. Future
#     releases are zero-touch.
#   - `workflow_dispatch { tag }` — ad-hoc / retro-publish. Useful
#     for the very first run on a tag that pre-dates this workflow,
#     and for re-runs after a transient registry failure.
#
# NB: we previously had `release: types: [published]` here, the
# natural-looking trigger, but GitHub Actions deliberately
# suppresses workflows triggered by events caused by another
# workflow's `GITHUB_TOKEN` (anti-recursion). release.yml's
# `gh release create` call thus never fired this workflow — see
# `feedback_github_token_no_downstream_workflows` for the saga.
#
# Required repo secret: NPM_TOKEN — a Granular Access Token from
# npmjs.com with `Read and write` permission on the `@helly25`
# scope, and 2FA "Auth Only" mode on the publisher account so the
# token bypasses interactive OTP. See docs/release.md §2.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.3). The GitHub Release for this tag must already exist."
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish @helly25/coderef
    runs-on: ubuntu-latest
    steps:
      # Fail fast if the secret isn't configured.
      - name: Verify NPM_TOKEN secret is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repo secret is not set. Add it at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GH_REF: ${{ github.ref }}
        run: |
          # workflow_dispatch: inputs.tag = "v0.2.3"
          # push:tags:        github.ref = "refs/tags/v0.2.3" → strip prefix
          tag="${INPUT_TAG:-${GH_REF#refs/tags/}}"
          if [ -z "$tag" ] || [ "$tag" = "$GH_REF" ]; then
            echo "::error::No tag resolved from inputs.tag or github.ref"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing tag: $tag"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      # The wrapper's postinstall downloads from the GitHub Release,
      # so this workflow must wait for release.yml (the other consumer
      # of the same tag-push event) to finish building the 4 platform
      # binaries and creating the release. release.yml typically takes
      # 10-15 min; poll up to 30 min total before giving up.
      #
      # On `workflow_dispatch`, the release usually already exists, so
      # the first poll wins and the wait collapses to seconds.
      - name: Wait for GitHub Release to be created with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          for i in $(seq 1 30); do
            assets=$(gh release view "$TAG" --json assets --jq '.assets | length' 2>/dev/null || echo "")
            if [ -n "$assets" ] && [ "$assets" -gt 0 ]; then
              echo "GitHub Release $TAG has $assets asset(s) — proceeding"
              exit 0
            fi
            echo "  poll $i/30: GitHub Release $TAG not yet ready, sleeping 60s"
            sleep 60
          done
          echo "::error::GitHub Release $TAG didn't appear within 30 minutes — release.yml may have failed. Inspect that workflow before re-running this one."
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # registry-url makes setup-node write a project-local
          # .npmrc that reads NODE_AUTH_TOKEN at publish time.
          registry-url: 'https://registry.npmjs.org/'

      - name: npm publish
        working-directory: npm/coderef
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Verify package on npm registry
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        # The registry can take a few seconds to surface a fresh
        # publish on its read-side. Poll briefly.
        run: |
          expected="${TAG#v}"
          for i in 1 2 3 4 5; do
            actual=$(npm view @helly25/coderef version 2>/dev/null || true)
            if [ "$actual" = "$expected" ]; then
              echo "@helly25/coderef@$actual is live"
              exit 0
            fi
            echo "  attempt $i: registry shows '$actual', want '$expected' — retrying"
            sleep 5
          done
          echo "::warning::registry didn't surface expected version within 25s; check https://www.npmjs.com/package/@helly25/coderef"
