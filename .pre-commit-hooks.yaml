# pre-commit framework integration. See DESIGN.md §16.1.
#
# v0.1 status:
#   - The engine (coderef-core), CLI (coderef), and editor (extension/)
#     all work end-to-end.
#   - The hooks below declare `language: node`, which assumes the
#     `@helly25/coderef` npm wrapper resolves to a real binary. v0.1
#     ships the binary via `cargo build --release`; the npm wrapper
#     downloads it from GitHub Releases in v0.2 once we publish.
#   - Until v0.2 lands, consumers who want to wire pre-commit hooks
#     should use `language: system` against a locally-built binary
#     (see this repo's own `.pre-commit-config.yaml` for an example
#     of dogfooding `coderef check` + `coderef doctor` in CI).
#   - The hooks below are the *target* shape we want consumers to
#     install once v0.2 lands; entries (`coderef check`, `coderef
#     doctor`) match the CLI surface already shipping.

- id: coderef-check
  name: coderef — verify changed source references
  description: Resolve and validate references in changed lines
  entry: coderef check --staged
  language: node
  pass_filenames: false
  always_run: false

- id: coderef-check-full
  name: coderef — verify all source references
  description: Resolve and validate every reference in the workspace
  entry: coderef check
  language: node
  pass_filenames: false
  stages: [manual]

- id: coderef-doctor
  name: coderef — integrity check of patterns
  description: Static + corpus-driven overlap and ambiguity checks
  entry: coderef doctor
  language: node
  pass_filenames: false

# Opt-in hooks below — see DESIGN.md §16.1.1 / §11 / §19 for context.

- id: coderef-changes
  name: coderef — verify coupled-change blocks (v0.2)
  description: IfChange/ThenChange enforcement on staged hunks
  entry: coderef changes --staged
  language: node
  pass_filenames: false

- id: coderef-commit-msg
  name: coderef — verify commit-message references (v0.2)
  description: Resolve and validate references found in the commit message
  entry: coderef check --commit-msg
  language: node
  stages: [commit-msg]
  pass_filenames: true

- id: coderef-upgrade-check
  name: coderef — enforce canonical marker form (v0.3)
  description: Fail if any legacy TODO / FIXME markers exist that `coderef upgrade` would rewrite
  entry: coderef upgrade --check-only
  language: node
  pass_filenames: false
  stages: [manual]
